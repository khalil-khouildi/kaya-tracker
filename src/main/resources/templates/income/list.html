<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="fas fa-money-bill-wave me-2" style="color: #10b981;"></i>Mes Revenus</h3>
        <a th:href="@{/incomes/add}" class="btn btn-success" style="background: #10b981; color: white;">
            <i class="fas fa-plus me-2"></i>Ajouter un revenu
        </a>
    </div>

    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show">
        <i class="fas fa-check-circle me-2"></i>Revenu ajouté avec succès !
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-header" style="background: #f8f9fa; border-bottom: 1px solid #dee2e6;">
            <h5 class="mb-0" style="color: #000;">Liste des revenus</h5>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead style="background: #e9ecef;">
                <tr>
                    <th style="color: #000; font-weight: 600;">Date</th>
                    <th style="color: #000; font-weight: 600;">Source</th>
                    <th style="color: #000; font-weight: 600;">Récurrent</th>
                    <th style="color: #000; font-weight: 600;">Montant</th>
                    <th style="color: #000; font-weight: 600;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="inc : ${incomes}" style="border-bottom: 1px solid #dee2e6;">
                    <td style="color: #000;" th:text="${#temporals.format(inc.createdAt, 'dd/MM/yyyy')}">-</td>
                    <td style="color: #000;" th:text="${inc.source}">-</td>
                    <td>
                        <span th:if="${inc.isRecurring}" class="badge" style="background: #3b82f6; color: white;">
                            <i class="fas fa-sync-alt me-1"></i>Récurrent
                        </span>
                        <span th:unless="${inc.isRecurring}" class="badge" style="background: #6c757d; color: white;">Ponctuel</span>
                    </td>
                    <td style="color: #10b981; font-weight: bold;" th:text="'€' + ${inc.amount}">-</td>
                    <td>
                        <a th:href="@{/incomes/delete/{id}(id=${inc.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Supprimer ce revenu ?')"
                           style="background: #dc2626; color: white;">
                            <i class="fas fa-trash-alt"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${incomes.isEmpty()}">
                    <td colspan="5" class="text-center py-4" style="color: #6c757d;">
                        <i class="fas fa-inbox fa-2x mb-2 d-block"></i>
                        Aucun revenu enregistré
                    </td>
                </tr>
                </tbody>
                <tfoot th:if="${!incomes.isEmpty()}" style="background: #f8f9fa;">
                <tr>
                    <td colspan="3" class="text-end fw-bold" style="color: #000;">Total :</td>
                    <td style="color: #10b981; font-weight: bold;" th:text="'€' + ${totalIncome}">-</td>
                    <td style="color: #000;"></td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>
</body>
</html>
