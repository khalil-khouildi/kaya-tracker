<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="fas fa-plus-circle text-success me-2"></i>Ajouter un revenu</h3>
        <a th:href="@{/incomes}" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-2"></i>Retour
        </a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/incomes/add}" method="post">
                <div class="mb-3">
                    <label class="form-label">Source *</label>
                    <input type="text" name="source" class="form-control"
                           placeholder="Ex: Stage, Allocation, Bourse, Cadeau..." required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Montant (€) *</label>
                    <input type="number" name="amount" class="form-control"
                           step="0.01" min="0.01" max="100000" placeholder="0.00" required>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" name="isRecurring" class="form-check-input" id="recurring">
                    <label class="form-check-label" for="recurring">
                        <i class="fas fa-sync-alt me-1"></i>Revenu récurrent (mensuel)
                    </label>
                    <div class="text-muted small">Cochez si ce revenu se répète chaque mois</div>
                </div>

                <div class="alert alert-info">
                    <i class="fas fa-info-circle me-2"></i>
                    La date du revenu sera automatiquement enregistrée comme aujourd'hui.
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/incomes}" class="btn btn-secondary">Annuler</a>
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save me-2"></i>Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
