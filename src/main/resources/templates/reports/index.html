<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div th:fragment="content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3><i class="fas fa-file-alt text-primary me-2"></i> Rapports</h3>
  </div>

  <div class="row">
    <div class="col-md-6 mx-auto">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-0 pt-3">
          <h5 class="fw-bold mb-0"><i class="fas fa-download me-2"></i> Exporter les dépenses</h5>
        </div>
        <div class="card-body">
          <form method="get" action="/reports/export/pdf" class="mb-3">
            <div class="row g-3">
              <div class="col-md-5">
                <label class="form-label">Mois</label>
                <select name="month" class="form-select">
                  <option th:each="m : ${#numbers.sequence(1, 12)}"
                          th:value="${m}"
                          th:text="${m}"
                          th:selected="${m == currentMonth}">1</option>
                </select>
              </div>
              <div class="col-md-5">
                <label class="form-label">Année</label>
                <select name="year" class="form-select">
                  <option th:each="y : ${#numbers.sequence(currentYear - 2, currentYear + 1)}"
                          th:value="${y}"
                          th:text="${y}"
                          th:selected="${y == currentYear}">2024</option>
                </select>
              </div>
              <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-danger w-100">
                  <i class="fas fa-file-pdf me-1"></i> PDF
                </button>
              </div>
            </div>
          </form>

          <form method="get" action="/reports/export/csv">
            <div class="row g-3">
              <div class="col-md-5">
                <label class="form-label">Mois</label>
                <select name="month" class="form-select">
                  <option th:each="m : ${#numbers.sequence(1, 12)}"
                          th:value="${m}"
                          th:text="${m}"
                          th:selected="${m == currentMonth}">1</option>
                </select>
              </div>
              <div class="col-md-5">
                <label class="form-label">Année</label>
                <select name="year" class="form-select">
                  <option th:each="y : ${#numbers.sequence(currentYear - 2, currentYear + 1)}"
                          th:value="${y}"
                          th:text="${y}"
                          th:selected="${y == currentYear}">2024</option>
                </select>
              </div>
              <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">
                  <i class="fas fa-file-csv me-1"></i> CSV
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Informations -->
  <div class="row mt-4">
    <div class="col-md-6 mx-auto">
      <div class="alert alert-info">
        <i class="fas fa-info-circle me-2"></i>
        <strong>Information :</strong> Les rapports incluent toutes les dépenses du mois sélectionné avec le total général.
      </div>
    </div>
  </div>
</div>
</body>
</html>
