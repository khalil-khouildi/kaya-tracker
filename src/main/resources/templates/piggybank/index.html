<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div th:fragment="content">
  <h3 class="mb-4"><i class="fas fa-piggy-bank text-warning me-2"></i>Ma Tirelire</h3>

  <div th:if="${param.goalCompleted}" class="alert alert-success">
    <i class="fas fa-trophy me-2"></i>Félicitations ! Objectif atteint !
  </div>
  <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>

  <!-- Solde actuel -->
  <div class="row mb-4">
    <div class="col-md-6 mx-auto">
      <div class="card text-center bg-warning text-white">
        <div class="card-body py-4">
          <i class="fas fa-piggy-bank fa-3x mb-3"></i>
          <h5>Économies totales</h5>
          <h2 th:text="'€' + ${piggyBank.totalSavings}">€0</h2>
          <small>Total emprunté: <span th:text="'€' + ${piggyBank.totalBorrowed}">€0</span></small>
        </div>
      </div>
    </div>
  </div>

  <!-- Objectif actif -->
  <div th:if="${activeGoal != null}" class="card mb-4 border-primary">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0"><i class="fas fa-bullseye me-2"></i>Objectif actif</h5>
    </div>
    <div class="card-body">
      <h4 th:text="${activeGoal.name}">Objectif</h4>
      <p th:text="${activeGoal.description}">Description</p>
      <div class="progress mb-3" style="height: 25px;">
        <div class="progress-bar bg-success"
             th:style="'width: ' + ${piggyBank.totalSavings * 100 / activeGoal.targetAmount} + '%'"
             th:text="${#numbers.formatDecimal(piggyBank.totalSavings * 100 / activeGoal.targetAmount, 0, 0)} + '%'">
          0%
        </div>
      </div>
      <div class="row">
        <div class="col-6">
          <small>Objectif: <strong th:text="'€' + ${activeGoal.targetAmount}">0</strong></small>
        </div>
        <div class="col-6 text-end">
          <small>Économisé: <strong th:text="'€' + ${piggyBank.totalSavings}">0</strong></small>
        </div>
      </div>

      <form th:action="@{/piggybank/complete/{id}(id=${activeGoal.id})}" method="post" class="mt-3">
        <button type="submit" class="btn btn-success w-100"
                th:disabled="${piggyBank.totalSavings < activeGoal.targetAmount}">
          <i class="fas fa-check-circle me-2"></i>
          <span th:if="${piggyBank.totalSavings >= activeGoal.targetAmount}">
                            Valider l'objectif
                        </span>
          <span th:unless="${piggyBank.totalSavings >= activeGoal.targetAmount}">
                            Pas assez d'économies (manque € + ${activeGoal.targetAmount - piggyBank.totalSavings})
                        </span>
        </button>
      </form>
    </div>
  </div>

  <!-- Objectifs à venir -->
  <div th:if="${!allGoals.isEmpty()}" class="card mb-4">
    <div class="card-header bg-secondary text-white">
      <h5 class="mb-0"><i class="fas fa-list me-2"></i>Objectifs à venir</h5>
    </div>
    <div class="card-body">
      <div th:each="goal : ${allGoals}" class="mb-3"
           th:unless="${activeGoal != null and goal.id == activeGoal.id}">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h6 th:text="${goal.name}">Objectif</h6>
            <small class="text-muted" th:text="${goal.description}">Description</small>
          </div>
          <div class="text-end">
            <strong th:text="'€' + ${goal.targetAmount}">0</strong>
            <span class="badge bg-secondary ms-2">Ordre <span th:text="${goal.orderIndex}">0</span></span>
          </div>
        </div>
        <hr th:unless="${goalStat.last}">
      </div>
    </div>
  </div>

  <!-- Objectifs accomplis -->
  <div th:if="${!completedGoals.isEmpty()}" class="card">
    <div class="card-header bg-success text-white">
      <h5 class="mb-0"><i class="fas fa-trophy me-2"></i>Objectifs accomplis</h5>
    </div>
    <div class="card-body">
      <div th:each="goal : ${completedGoals}" class="mb-2">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <i class="fas fa-check-circle text-success me-2"></i>
            <span th:text="${goal.name}">Objectif</span>
          </div>
          <div>
            <small class="text-muted" th:text="${#temporals.format(goal.completedDate, 'dd/MM/yyyy')}">Date</small>
            <strong class="ms-2" th:text="'€' + ${goal.targetAmount}">0</strong>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
